apiVersion: v1
kind: ServiceAccount
metadata:
  name: job-reporter
  namespace: gang-bench
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: job-reporter
  namespace: gang-bench
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get"]
- apiGroups: ["kueue.x-k8s.io"]
  resources: ["workloads"]
  verbs: ["list"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: job-reporter
  namespace: gang-bench
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: job-reporter
subjects:
- kind: ServiceAccount
  name: job-reporter
  namespace: gang-bench
