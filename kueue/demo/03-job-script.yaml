apiVersion: v1
kind: ConfigMap
metadata:
  name: job-script
  namespace: batch
data:
  job.py: |
    #!/usr/bin/env python3
    """
    Timestamps the start and end of a 12-second sleep, queries Kueue and Kubernetes
    for admission and scheduling times, and POSTs a structured record to the orchestrator.

    Fields in the posted record:
      job_name             - name of this Job object
      pod_name             - name of this pod
      quota_reserved_time  - when Kueue reserved quota (Workload condition QuotaReserved)
      admitted_time        - when Kueue fully admitted the workload (condition Admitted)
      pod_scheduled_time   - when Kubernetes placed the pod on a node (condition PodScheduled)
      script_start         - first line of this script executing (container start)
      script_end           - last line before exit (after 12s sleep)
    """
    import json
    import os
    import ssl
    import time
    import urllib.request
    from datetime import datetime, timezone

    def now_iso():
        return datetime.now(timezone.utc).isoformat()

    def k8s_get(path, token, ca_cert):
        url = f"https://kubernetes.default.svc{path}"
        req = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}"})
        ctx = ssl.create_default_context(cafile=ca_cert)
        with urllib.request.urlopen(req, context=ctx, timeout=10) as r:
            return json.loads(r.read())

    def get_condition_time(conditions, cond_type):
        for c in (conditions or []):
            if c.get("type") == cond_type and c.get("status") == "True":
                return c.get("lastTransitionTime")
        return None

    def main():
        script_start = now_iso()  # capture as early as possible

        job_name  = os.environ["JOB_NAME"]
        pod_name  = os.environ["POD_NAME"]
        sa_path   = "/var/run/secrets/kubernetes.io/serviceaccount"
        namespace = open(f"{sa_path}/namespace").read().strip()
        token     = open(f"{sa_path}/token").read().strip()
        ca_cert   = f"{sa_path}/ca.crt"
        orch_url  = os.environ.get("ORCHESTRATOR_URL", "http://orchestrator-svc.batch.svc.cluster.local:8080")

        quota_reserved_time = None
        admitted_time       = None
        pod_scheduled_time  = None

        # -- Kueue Workload admission times --
        try:
            job = k8s_get(f"/apis/batch/v1/namespaces/{namespace}/jobs/{job_name}", token, ca_cert)
            job_uid = job["metadata"]["uid"]
            workloads = k8s_get(f"/apis/kueue.x-k8s.io/v1beta2/namespaces/{namespace}/workloads", token, ca_cert)
            for wl in workloads.get("items", []):
                for ref in wl.get("metadata", {}).get("ownerReferences", []):
                    if ref.get("uid") == job_uid:
                        conds = wl.get("status", {}).get("conditions", [])
                        quota_reserved_time = get_condition_time(conds, "QuotaReserved")
                        admitted_time       = get_condition_time(conds, "Admitted")
                        break
        except Exception as e:
            print(f"Warning: workload query failed: {e}", flush=True)

        # -- Kubernetes pod scheduling time --
        try:
            pod = k8s_get(f"/api/v1/namespaces/{namespace}/pods/{pod_name}", token, ca_cert)
            conds = pod.get("status", {}).get("conditions", [])
            pod_scheduled_time = get_condition_time(conds, "PodScheduled")
        except Exception as e:
            print(f"Warning: pod query failed: {e}", flush=True)

        time.sleep(12)
        script_end = now_iso()

        record = {
            "job_name":            job_name,
            "pod_name":            pod_name,
            "quota_reserved_time": quota_reserved_time,
            "admitted_time":       admitted_time,
            "pod_scheduled_time":  pod_scheduled_time,
            "script_start":        script_start,
            "script_end":          script_end,
        }

        # POST with exponential backoff
        body = json.dumps(record).encode()
        for attempt in range(5):
            try:
                req = urllib.request.Request(
                    f"{orch_url}/record",
                    data=body,
                    headers={"Content-Type": "application/json"},
                    method="POST",
                )
                with urllib.request.urlopen(req, timeout=10) as r:
                    r.read()
                break
            except Exception as e:
                print(f"POST attempt {attempt + 1} failed: {e}", flush=True)
                if attempt < 4:
                    time.sleep(2 ** attempt)

    if __name__ == "__main__":
        main()
